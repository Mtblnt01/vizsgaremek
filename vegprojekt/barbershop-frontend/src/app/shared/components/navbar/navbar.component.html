<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">
      BarberShop
    </a>
    <button class="navbar-toggler" type="button" (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            Főoldal
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/gallery" routerLinkActive="active">
            Galéria
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">
            Rólunk
          </a>
        </li>

        <!-- Bejelentkezett user -->
        <ng-container *ngIf="authService.isLoggedIn; else notLoggedIn">
          <li class="nav-item" *ngIf="authService.isAdmin">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active">
              Admin
            </a>
          </li>
          <li class="nav-item" *ngIf="authService.isBarber">
            <a class="nav-link" routerLink="/barber-dashboard" routerLinkActive="active">
              Foglalásaim
            </a>
          </li>
          <li class="nav-item ms-lg-2">
            <span class="nav-link user-name">
              {{ (authService.currentUser$ | async)?.name }}
            </span>
          </li>
          <li class="nav-item ms-lg-1">
            <a class="nav-link btn-nav-outline" style="cursor: pointer" (click)="logout()">
              Kijelentkezés
            </a>
          </li>
        </ng-container>

        <!-- Nincs bejelentkezve -->
        <ng-template #notLoggedIn>
          <li class="nav-item ms-lg-2">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              Bejelentkezés
            </a>
          </li>
          <li class="nav-item ms-lg-1">
            <a class="nav-link btn-nav-gold" routerLink="/register" routerLinkActive="active">
              Regisztráció
            </a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
