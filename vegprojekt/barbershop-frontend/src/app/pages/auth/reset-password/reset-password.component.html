<div class="auth-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg border-0">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-shield-lock display-4 text-dark"></i>
              <h3 class="mt-2 fw-bold">Jelszó visszaállítás</h3>
            </div>

            <div *ngIf="successMessage" class="alert alert-success">
              <i class="bi bi-check-circle me-1"></i>{{ successMessage }}
              <div class="mt-2">
                <a routerLink="/login" class="btn btn-sm btn-success">Bejelentkezés</a>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">
              <i class="bi bi-exclamation-triangle me-1"></i>{{ errorMessage }}
            </div>

            <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
              <div class="mb-3">
                <label for="email" class="form-label">E-mail cím</label>
                <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" required />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Új jelszó</label>
                <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required />
              </div>

              <div class="mb-4">
                <label for="passwordConfirmation" class="form-label">Új jelszó megerősítés</label>
                <input type="password" class="form-control" id="passwordConfirmation" [(ngModel)]="passwordConfirmation" name="passwordConfirmation" required />
              </div>

              <button type="submit" class="btn btn-dark w-100 py-2" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                Jelszó visszaállítása
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
