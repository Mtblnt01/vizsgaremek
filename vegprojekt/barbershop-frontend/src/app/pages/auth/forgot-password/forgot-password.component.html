<div class="auth-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg border-0">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-key display-4 text-dark"></i>
              <h3 class="mt-2 fw-bold">Elfelejtett jelszó</h3>
              <p class="text-muted">Add meg az e-mail címedet a jelszó visszaállításhoz</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success">
              <i class="bi bi-check-circle me-1"></i>{{ successMessage }}
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">
              <i class="bi bi-exclamation-triangle me-1"></i>{{ errorMessage }}
            </div>

            <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
              <div class="mb-4">
                <label for="email" class="form-label">E-mail cím</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    [(ngModel)]="email"
                    name="email"
                    placeholder="pelda@email.hu"
                    required
                  />
                </div>
              </div>

              <button type="submit" class="btn btn-dark w-100 py-2" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                Link küldése
              </button>
            </form>

            <div class="text-center mt-4">
              <a routerLink="/login" class="text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Vissza a bejelentkezéshez
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
